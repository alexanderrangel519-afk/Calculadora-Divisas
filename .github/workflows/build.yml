name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt update
        # Añadimos m4 y gettext para solucionar el error de macro
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev m4 gettext
        pip3 install --user --upgrade buildozer
    - name: Build with Buildozer
      run: |
        # Forzamos una limpieza previa para asegurar un entorno fresco
        buildozer android clean
        buildozer android debug
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
